<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gabriel Costa | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/your-code.js" crossorigin="anonymous"></script> <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #0A0A0B;
            --card-bg: #161618;
            --primary-blue: #2563EB;
            --accent-amber: #f5be0b;
            --impact-red: #DC2626;
            --text-main: #FFFFFF;
            --text-dim: #A1A1AA;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* --- HEADER --- */
        header {
            position: fixed;
            top: 0; width: 100%;
            padding: 1rem 5%;
            background: rgba(10, 10, 11, 0.8);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            border-bottom: 1px solid #27272A;
        }

        .lang-switcher { display: flex; gap: 15px; }
        .lang-btn {
            width: 35px; height: 35px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.3s;
            object-fit: cover;
        }
        .lang-btn:hover, .lang-btn.active { border-color: var(--accent-amber); transform: scale(1.1); }

        /* --- HERO SECTION --- */
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            padding: 0 10%;
            padding-top: 80px;
            gap: 50px;
        }

        .hero-content { flex: 1; }
        .hero-content h1 { font-size: 4rem; color: var(--text-main); }
        .hero-content h2 { font-size: 1.5rem; color: var(--primary-blue); margin-bottom: 1rem; }
        .hero-content p { color: var(--text-dim); max-width: 600px; margin-bottom: 2rem; }

        .hero-image {
            flex: 1;
            height: 80%;
            position: relative;
            /* Máscara para integrar a foto ao fundo preto */
            -webkit-mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
            mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
        }
        .hero-image img { width: 100%; height: 100%; object-fit: contain; }

        /* --- SKILLS TICKER --- */
        .ticker-container {
            background: var(--card-bg);
            padding: 20px 0;
            border-y: 1px solid #27272A;
            overflow: hidden;
        }
        .ticker-wrapper { display: flex; animation: slide 30s linear infinite; width: max-content; }
        .skill-item {
            padding: 0 40px;
            font-weight: 600;
            color: var(--text-dim);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .skill-item i { color: var(--accent-amber); }

        @keyframes slide {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* --- ABOUT ME --- */
        .about-section { padding: 100px 10%; display: grid; grid-template-columns: 1.2fr 1fr; gap: 50px; }
        .video-box {
            background: #000;
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid var(--primary-blue);
            box-shadow: 0 0 20px rgba(37, 99, 235, 0.2);
            aspect-ratio: 16/9;
        }

        /* --- PROJECTS --- */
        .projects-grid {
            padding: 50px 10%;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }
        .project-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid #27272A;
            transition: 0.3s;
            cursor: pointer;
        }
        .project-card:hover { border-color: var(--accent-amber); transform: translateY(-5px); }
        .project-card h3 { margin-bottom: 15px; color: var(--accent-amber); }

        /* --- MODAL (SUBPÁGINA) --- */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            overflow-y: auto;
            padding: 50px 10%;
        }
        .modal-content { color: white; }
        .close-modal { position: fixed; top: 20px; right: 50px; font-size: 2rem; cursor: pointer; color: var(--accent-amber); }

        .btn-download {
            display: inline-block;
            background: var(--primary-blue);
            color: white;
            padding: 12px 25px;
            border-radius: 5px;
            text-decoration: none;
            margin-top: 20px;
            font-weight: bold;
        }

        /* --- CONTACT --- */
        footer { padding: 50px 10%; border-top: 1px solid #27272A; text-align: center; }
        .contact-links { display: flex; justify-content: center; gap: 30px; margin-top: 20px; }
        .contact-links a { color: var(--text-dim); text-decoration: none; font-size: 1.2rem; transition: 0.3s; }
        .contact-links a:hover { color: var(--accent-amber); }

    </style>
</head>
<body>

    <header>
        <div style="font-weight: bold; font-size: 1.5rem;">GC<span style="color:var(--accent-amber)">.</span></div>
        <div class="lang-switcher">
            <img src="https://flagcdn.com/w80/br.png" class="lang-btn active" onclick="setLanguage('pt')" alt="PT">
            <img src="https://flagcdn.com/w80/us.png" class="lang-btn" onclick="setLanguage('en')" alt="EN">
            <img src="https://flagcdn.com/w80/es.png" class="lang-btn" onclick="setLanguage('es')" alt="ES">
        </div>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h2 id="hero-role">Economista, BI & Data Science</h2>
            <h1 id="hero-name">Gabriel Costa</h1>
            <p id="hero-desc">Especializado em transformar dados em análises que geram resultados e impactos reais!</p>
            <div class="contact-links" style="justify-content: flex-start;">
                <a href="mailto:gabrielcostaeconomista@gmail.com"><i class="fas fa-envelope"></i></a>
                <a href="https://www.linkedin.com/in/gabrielcostaeco/" target="_blank"><i class="fab fa-linkedin"></i></a>
                <a href="https://wa.me/5537999876476" target="_blank"><i class="fab fa-whatsapp"></i> (37) 9 9987-6476</a>
            </div>
        </div>
        <div class="hero-image">
            <img src="sua-foto.png" alt="Gabriel Costa">
        </div>
    </section>

    <div class="ticker-container">
        <div class="ticker-wrapper" id="skills-ticker">
            </div>
    </div>

    <section class="about-section">
        <div>
            <h2 id="about-title" style="color: var(--accent-amber); margin-bottom: 20px;">Quem Sou Eu</h2>
            <p id="about-text" style="color: white;"></p>
        </div>
        <div class="video-box">
            <iframe width="100%" height="100%" src="https://www.youtube.com/embed/SEU_VIDEO_ID" frameborder="0" allowfullscreen></iframe>
        </div>
    </section>

    <section class="projects-grid" id="projects-container">
        </section>

    <div id="projectModal" class="modal">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <div class="modal-content" id="modalContent">
            </div>
    </div>

    <footer>
        <p>© 2026 Gabriel Costa - Economista & Analista de Dados</p>
    </footer>

    <script>
        const translations = {
            pt: {
                role: "Economista, Business Intelligence & Data Science",
                desc: "Especializado em transformar dados em análises que geram resultados e impactos reais!",
                aboutTitle: "Quem Sou Eu",
                aboutText: "Olá! Bem-vindo à minha página no GitHub! Sou Bacharel em Ciências Econômicas (UFSJ) e mestrando em Data Science (USP/Esalq). Minha trajetória une o rigor técnico da análise econômica à agilidade das decisões orientadas a dados. Atuei em gestão, inteligência financeira e auditoria, com destaque para projetos que geraram economias superiores a R$ 5 milhões.",
                projectBtn: "Ver Detalhes do Projeto",
                downloadBtn: "Baixar Arquivo do Projeto (.pbix / .sql)"
            },
            en: {
                role: "Economist, Business Intelligence & Data Science",
                desc: "Specialized in transforming data into insights that drive real results and impact!",
                aboutTitle: "About Me",
                aboutText: "Hello! Welcome to my GitHub page! I hold a B.S. in Economics (UFSJ) and I'm currently an MBA student in Data Science (USP/Esalq). My career merges technical economic analysis with data-driven decision agility. I've worked in management, financial intelligence, and auditing, highlighting projects that saved over R$ 5 million.",
                projectBtn: "View Project Details",
                downloadBtn: "Download Project File (.pbix / .sql)"
            },
            es: {
                role: "Economista, Business Intelligence & Data Science",
                desc: "¡Especializado en transformar datos en análisis que generan resultados e impactos reales!",
                aboutTitle: "Quién Soy",
                aboutText: "¡Hola! ¡Bienvenido a mi página de GitHub! Soy Licenciado en Economía (UFSJ) y estudiante de MBA en Ciencia de Datos (USP/Esalq). Mi trayectoria une el rigor técnico del análisis económico con la agilidad de las decisiones orientadas a datos. He trabajado en gestión, inteligencia financiera y auditoría, destacando proyectos que generaron ahorros superiores a R$ 5 millones.",
                projectBtn: "Ver Detalles del Proyecto",
                downloadBtn: "Descargar Archivo del Proyecto (.pbix / .sql)"
            }
        };

        const projects = [
            {
                id: 1,
                title: "Dashboard PowerBI: Mercado Financeiro",
                summary: "Análise do mercado de ações das Instituições Financeiras Brasileiras.",
                details: "Fontes: Banco Central (BCB), CVM. Ferramentas: Python para automação, SQL Server para limpeza e PowerBI para visualização com DAX avançado.",
                video: "ID_VIDEO_PROJETO_1",
                downloadUrl: "caminho/seu_projeto.pbix"
            },
            {
                id: 2,
                title: "SQL Server: Base de Dados Bancária",
                summary: "Criação de base ETL para instituições financeiras listadas na B3.",
                details: "Reunião de bases IFDATA e CVM para criação de tabelas e views estratégicas.",
                video: "ID_VIDEO_PROJETO_2",
                downloadUrl: "caminho/script.sql"
            }
        ];

        const skills = ["Data Visualization", "SQL Server", "PostgreSQL", "Python", "PowerBI", "Corporate Finance", "Macroeconomics", "Data Science"];

        function setLanguage(lang) {
            document.getElementById('hero-role').innerText = translations[lang].role;
            document.getElementById('hero-desc').innerText = translations[lang].desc;
            document.getElementById('about-title').innerText = translations[lang].aboutTitle;
            document.getElementById('about-text').innerText = translations[lang].aboutText;
            
            // Atualizar botões ativos
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            renderProjects(lang);
        }

        function renderProjects(lang) {
            const container = document.getElementById('projects-container');
            container.innerHTML = projects.map(p => `
                <div class="project-card" onclick="openModal(${p.id})">
                    <h3>${p.title}</h3>
                    <p>${p.summary}</p>
                    <small style="color:var(--primary-blue)">${translations[lang].projectBtn} →</small>
                </div>
            `).join('');
        }

        function openModal(id) {
            const p = projects.find(proj => proj.id === id);
            const lang = document.querySelector('.lang-btn.active').alt.toLowerCase();
            document.getElementById('modalContent').innerHTML = `
                <h1 style="color:var(--accent-amber)">${p.title}</h1>
                <hr style="margin: 20px 0; border: 0; border-top: 1px solid #333;">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 40px;">
                    <div>
                        <h3>Descrição Técnica</h3>
                        <p style="margin-top:15px;">${p.details}</p>
                        <a href="${p.downloadUrl}" class="btn-download"><i class="fas fa-download"></i> ${translations[lang].downloadBtn}</a>
                        <div style="margin-top:30px;">
                            <h4>Screenshots</h4>
                            <div style="display:flex; gap:10px; margin-top:10px;">
                                <div style="width:100px; height:60px; background:#333; border-radius:5px;"></div>
                                <div style="width:100px; height:60px; background:#333; border-radius:5px;"></div>
                            </div>
                        </div>
                    </div>
                    <div class="video-box">
                        <iframe width="100%" height="100%" src="https://www.youtube.com/embed/${p.video}" frameborder="0" allowfullscreen></iframe>
                    </div>
                </div>
            `;
            document.getElementById('projectModal').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('projectModal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        // Ticker de Habilidades
        const ticker = document.getElementById('skills-ticker');
        const content = skills.map(s => `<div class="skill-item"><i class="fas fa-check-circle"></i> ${s}</div>`).join('');
        ticker.innerHTML = content + content; // Dobrar para loop infinito

        // Inicializar
        setLanguage('pt');
    </script>
</body>
</html>
